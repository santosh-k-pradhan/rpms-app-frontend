<div class="container mt-4">
  <div class="card p-4 shadow">
    <h4>Upload Pricing CSV</h4>

    <input type="file"
           class="form-control mt-2"
           (change)="onFileChange($event)"
           accept=".csv">

    <button class="btn btn-primary mt-3"
            (click)="upload()">
      Upload
    </button>

    <div class="mt-3 text-success">
      {{ message }}
    </div>
  </div>
</div>
